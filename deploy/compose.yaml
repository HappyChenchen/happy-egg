services:
  relay:
    build: ../relay
    restart: unless-stopped
    environment:
      MACPET_REGISTRY_PATH: /data/registry.json
      # Relay is only reachable through the Caddy service in this network.
      MACPET_TRUST_PROXY: "true"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - relay_data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      relay:
        condition: service_healthy
volumes:
  relay_data:
  caddy_data:
  caddy_config:
