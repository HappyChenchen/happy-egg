<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>团团 · 网页宠物</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="desktop-shell">
      <header class="topbar">
        <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></div>
        <h1>MacPet</h1>
        <div class="header-actions">
          <div class="connection-pill" id="connection-pill" data-state="idle"><i></i><span id="connection-label">未连接</span></div>
          <button class="menu-trigger" id="menu-button" type="button" aria-expanded="false" aria-label="更多操作">
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <circle cx="4" cy="10" r="1.5" />
              <circle cx="10" cy="10" r="1.5" />
              <circle cx="16" cy="10" r="1.5" />
            </svg>
          </button>
        </div>
      </header>

      <section class="desktop-scene" id="desktop-scene">
        <section class="pet-card" id="pet-card" aria-live="polite" data-scale="normal">
          <div class="pet-card-top"><span class="pet-code" id="pet-code">等待配对</span></div>
          <div class="pet-stage" id="pet-stage">
            <img id="pet-image" src="../Sources/MacPet/Resources/ai_buddy_05.png" alt="宠物形象" />
          </div>
          <div class="pet-caption">
            <span class="status-dot" id="pet-status-dot"></span>
            <div><h2 id="pet-name">未连接</h2><p id="pet-message">打开“操作”输入配对码</p></div>
          </div>
        </section>

        <aside class="operation-menu" id="operation-menu" aria-label="宠物操作菜单" hidden>
          <div class="menu-heading"><strong id="menu-pet-name">未连接</strong><span id="menu-state">未连接</span></div>
          <div class="menu-divider"></div>
          <div class="menu-pair-row"><input id="pairing-code" maxlength="64" inputmode="text" autocomplete="off" placeholder="输入 8 位配对码" /><button class="menu-connect" id="connect-button" type="button">连接</button></div>
          <input class="menu-name-input" id="web-name" maxlength="20" value="网页宠物" autocomplete="off" aria-label="网页端名字" />
          <div class="menu-divider"></div>
          <div class="menu-actions">
            <button class="menu-action action-poke" data-kind="poke" type="button" disabled><span>↗</span>拍一拍</button>
            <button class="menu-action action-heart" data-kind="heart" type="button" disabled><span>♥</span>送爱心</button>
            <button class="menu-action action-celebrate" data-kind="celebrate" type="button" disabled><span>✦</span>庆祝</button>
          </div>
          <div class="menu-divider"></div>
          <div class="menu-label">大小</div>
          <div class="scale-row" aria-label="宠物大小">
            <button class="scale-option" data-scale="small" type="button">小</button>
            <button class="scale-option is-selected" data-scale="normal" type="button">正常</button>
            <button class="scale-option" data-scale="large" type="button">大</button>
          </div>
          <button class="menu-row" id="hide-button" type="button">隐藏宠物</button>
          <button class="menu-row menu-row-muted" id="disconnect-button" type="button" disabled>断开连接</button>
        </aside>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
